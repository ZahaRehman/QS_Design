# Supabase CLI local project config for this monorepo.
project_id = "qs-design"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3001"
additional_redirect_urls = ["http://localhost:3001", "http://localhost:3002"]
jwt_expiry = 3600
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.admin-auth]
verify_jwt = false

[functions.admin-catalog]
verify_jwt = false

[functions.admin-orders]
verify_jwt = false

[functions.store-catalog]
verify_jwt = false

[functions.store-checkout]
verify_jwt = false
